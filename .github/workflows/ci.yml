name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push the auto-generated version tag

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          # fetch-depth 0 required so the tag push step can see existing tags
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Typecheck (core)
        run: bun run --filter './packages/core' typecheck

      - name: Typecheck (cli)
        run: bun run --filter './packages/cli' typecheck

      - name: Test (core)
        run: bun run --filter './packages/core' test

      - name: Test (cli)
        run: bun run --filter './packages/cli' test

      # Auto-tag and publish run only on main pushes (not PRs).
      # GITHUB_TOKEN tag pushes don't trigger other workflows (GitHub security
      # guard), so publish runs here directly after the tag step.
      # Each publish step skips silently if that version is already on npm.

      - name: Auto-tag release if version is new
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          TAG="v${VERSION}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists — skipping."
          else
            echo "Creating tag ${TAG}"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Publish @appydave/appysentinel-config
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version 2>/dev/null | grep -q "$VER"; then
            echo "$PKG@$VER already published — skipping"
          else
            npm publish --access public
          fi
        working-directory: packages/config
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @appydave/appysentinel-core
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version 2>/dev/null | grep -q "$VER"; then
            echo "$PKG@$VER already published — skipping"
          else
            bun run build
            npm publish --access public
          fi
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-appysentinel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version 2>/dev/null | grep -q "$VER"; then
            echo "$PKG@$VER already published — skipping"
          else
            bun run build
            npm publish --access public
          fi
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
