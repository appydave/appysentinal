name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck (core)
        run: bun run --filter './packages/core' typecheck

      - name: Typecheck (cli)
        run: bun run --filter './packages/cli' typecheck

      - name: Test (core)
        run: bun run --filter './packages/core' test

      - name: Test (cli)
        run: bun run --filter './packages/cli' test
