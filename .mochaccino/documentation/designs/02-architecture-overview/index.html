<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppySentinel — Architecture Overview</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Roboto+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-brown:        #342d2d;
      --brand-gold:         #ccba9d;
      --brand-yellow:       #ffde59;
      --brand-amber:        #c8841a;
      --brand-muted:        #7a6e5e;
      --brand-near-white:   #faf5ec;
      --brand-surface:      #f0ebe4;
      --brand-linen:        #e8e0d4;
      --brand-border:       #d4cdc4;
      --brand-chrome:       #1a1515;
      --brand-dark-surface: #25201e;

      --layer-foundation: #342d2d;
      --layer-collect:    #1a5fa0;
      --layer-internal:   #5a4a3a;
      --layer-expose:     #2a7a5a;
      --layer-deliver:    #a05a1a;
      --layer-ops:        #4a3d6e;

      --collect-bg:    #eaf2fc;
      --internal-bg:   #f4f0eb;
      --expose-bg:     #e6f5ee;
      --deliver-bg:    #fdf0dc;
      --ops-bg:        #f0edf9;
      --foundation-bg: #e8e4df;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--brand-near-white);
      color: var(--brand-brown);
      line-height: 1.6;
    }

    .mocha-banner {
      background: var(--brand-chrome);
      color: var(--brand-gold);
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      padding: 7px 32px;
      letter-spacing: 0.1em;
    }

    .container {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 40px;
    }

    .page-header {
      padding: 56px 0 32px;
      border-bottom: 2px solid var(--brand-linen);
    }

    .eyebrow {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-amber);
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: clamp(34px, 4.5vw, 52px);
      line-height: 1.0;
      text-transform: uppercase;
      color: var(--brand-brown);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--brand-muted);
      font-weight: 300;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 20px;
      padding: 16px 0 0;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--brand-muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
    }

    /* Controls row */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      padding: 20px 0 8px;
      border-bottom: 1px solid var(--brand-linen);
    }

    .ctrl-btn {
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brand-muted);
      background: none;
      border: 1px solid var(--brand-border);
      padding: 4px 10px;
      cursor: pointer;
    }
    .ctrl-btn:hover { color: var(--brand-brown); border-color: var(--brand-brown); }

    /* Layer stack */
    .layer-stack { padding: 20px 0 40px; }

    .layer { margin-bottom: 3px; }

    .layer-header {
      display: flex;
      align-items: stretch;
      cursor: pointer;
      user-select: none;
    }

    .layer-stripe { width: 6px; flex-shrink: 0; }

    .layer-title-bar {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
    }

    .layer-label {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .layer-desc {
      font-size: 12px;
      color: var(--brand-muted);
      margin-top: 3px;
      max-width: 680px;
    }

    .layer-item-count {
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      color: var(--brand-muted);
    }

    .layer-chevron {
      font-size: 11px;
      color: var(--brand-muted);
      margin-left: 12px;
      transition: transform 0.2s ease;
      display: inline-block;
    }

    .layer.open .layer-chevron { transform: rotate(180deg); }

    .layer-body { display: none; padding: 0 0 4px 6px; }
    .layer.open .layer-body { display: block; }

    /* Item cards grid */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: var(--brand-border);
    }

    .item-card {
      background: var(--brand-near-white);
      padding: 16px 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* WHY tag leads — top of card */
    .item-why {
      display: inline-block;
      font-family: 'Roboto Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--brand-yellow);
      color: var(--brand-brown);
      padding: 2px 7px;
      margin-bottom: 8px;
      align-self: flex-start;
    }

    .item-why-spacer {
      /* keeps card height consistent when no WHY tag */
      height: 20px;
      margin-bottom: 8px;
    }

    .item-name {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 3px;
    }

    .item-code {
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      color: var(--brand-muted);
      margin-bottom: 8px;
    }

    /* Description: clamped to 2 lines on face */
    .item-desc {
      font-size: 12.5px;
      color: var(--brand-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Expand toggle */
    .item-expand-toggle {
      font-family: 'Roboto Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.08em;
      color: var(--brand-border);
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px 0 0;
      text-align: left;
      text-transform: uppercase;
    }
    .item-expand-toggle:hover { color: var(--brand-muted); }

    /* Full description shown when expanded */
    .item-desc-full {
      display: none;
      font-size: 12.5px;
      color: var(--brand-muted);
      line-height: 1.55;
    }

    .item-card.expanded .item-desc { display: none; }
    .item-card.expanded .item-desc-full { display: block; }
    .item-card.expanded .item-expand-toggle { color: var(--brand-muted); }

    /* Baked badge */
    .badge-baked {
      display: inline-block;
      font-family: 'Roboto Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--brand-yellow);
      color: var(--brand-brown);
      padding: 1px 6px;
      margin-bottom: 6px;
    }

    .open-decision {
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--brand-linen);
      border-left: 3px solid var(--brand-amber);
      font-size: 12px;
      color: var(--brand-muted);
      line-height: 1.55;
    }
    .open-decision-label {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--brand-amber);
      margin-bottom: 4px;
    }

    .storage-rule {
      margin-bottom: 12px;
      padding: 10px 14px;
      background: var(--brand-surface);
      border-left: 3px solid var(--brand-gold);
      font-size: 12px;
      color: var(--brand-muted);
      font-style: italic;
      line-height: 1.55;
    }

    /* Layer colour themes */
    .layer-foundation .layer-stripe { background: var(--layer-foundation); }
    .layer-foundation .layer-title-bar { background: var(--foundation-bg); }
    .layer-foundation .layer-label { color: var(--layer-foundation); }
    .layer-foundation .item-name { color: var(--layer-foundation); }

    .layer-collect .layer-stripe { background: var(--layer-collect); }
    .layer-collect .layer-title-bar { background: var(--collect-bg); }
    .layer-collect .layer-label { color: var(--layer-collect); }
    .layer-collect .item-name { color: var(--layer-collect); }

    .layer-internal .layer-stripe { background: var(--layer-internal); }
    .layer-internal .layer-title-bar { background: var(--internal-bg); }
    .layer-internal .layer-label { color: var(--layer-internal); }
    .layer-internal .item-name { color: var(--layer-internal); }

    .layer-expose .layer-stripe { background: var(--layer-expose); }
    .layer-expose .layer-title-bar { background: var(--expose-bg); }
    .layer-expose .layer-label { color: var(--layer-expose); }
    .layer-expose .item-name { color: var(--layer-expose); }

    .layer-deliver .layer-stripe { background: var(--layer-deliver); }
    .layer-deliver .layer-title-bar { background: var(--deliver-bg); }
    .layer-deliver .layer-label { color: var(--layer-deliver); }
    .layer-deliver .item-name { color: var(--layer-deliver); }

    .layer-ops .layer-stripe { background: var(--layer-ops); }
    .layer-ops .layer-title-bar { background: var(--ops-bg); }
    .layer-ops .layer-label { color: var(--layer-ops); }
    .layer-ops .item-name { color: var(--layer-ops); }

    /* Footer */
    .page-footer { padding: 28px 0 40px; border-top: 1px solid var(--brand-linen); margin-top: 20px; }
    .footer-note {
      font-family: 'Roboto Mono', monospace;
      font-size: 10.5px;
      color: var(--brand-border);
      text-align: center;
      letter-spacing: 0.08em;
    }
    .github-link {
      color: var(--brand-muted);
      text-decoration: none;
      border-bottom: 1px solid var(--brand-border);
      padding-bottom: 1px;
    }
    .github-link:hover { color: var(--brand-brown); }

    .loading {
      text-align: center;
      padding: 120px 40px;
      font-family: 'Roboto Mono', monospace;
      font-size: 13px;
      color: var(--brand-muted);
    }
  </style>
</head>
<body>

<div class="mocha-banner">Mocha — Architecture Overview — 2026-04-26</div>
<div id="app"><div class="loading">Loading…</div></div>

<script>
fetch('../../data/02-architecture-overview.json')
  .then(r => r.json())
  .then(render)
  .catch(e => {
    document.getElementById('app').innerHTML =
      `<div class="loading">Could not load data: ${e.message}</div>`;
  });

const layerClass = {
  foundation: 'layer-foundation',
  collect:    'layer-collect',
  internal:   'layer-internal',
  expose:     'layer-expose',
  deliver:    'layer-deliver',
  operational:'layer-ops'
};

let cardCounter = 0;

function renderItems(layer) {
  const isBaked = layer.id === 'foundation';
  return layer.items.map(item => {
    const cardId = 'card-' + (++cardCounter);
    const hasFullDesc = item.description && item.description.length > 80;
    return `
      <div class="item-card" id="${cardId}">
        ${item.why
          ? `<div class="item-why">↳ ${item.why}</div>`
          : `<div class="item-why-spacer"></div>`}
        <div class="item-name">${item.name}</div>
        ${item.code ? `<div class="item-code">${item.code}</div>` : ''}
        <div class="item-desc">${item.description}</div>
        ${hasFullDesc ? `<div class="item-desc-full">${item.description}</div>` : ''}
        ${hasFullDesc
          ? `<button class="item-expand-toggle" onclick="toggleCard('${cardId}')">+ more</button>`
          : ''}
      </div>
    `;
  }).join('');
}

function renderLayerExtras(layer) {
  let extras = '';
  if (layer.storage_rule) {
    extras += `<div class="storage-rule">${layer.storage_rule}</div>`;
  }
  if (layer.open_decision) {
    extras += `<div class="open-decision"><div class="open-decision-label">Open design decision</div>${layer.open_decision}</div>`;
  }
  return extras;
}

function render(d) {
  const legendItems = [
    { color: 'var(--layer-foundation)', label: 'Foundation — baked in (packages/core)' },
    { color: 'var(--layer-collect)',    label: 'Collect — inbound boundary' },
    { color: 'var(--layer-internal)',   label: 'Internal — storage & enrichment' },
    { color: 'var(--layer-expose)',     label: 'Expose — read surface (API / CLI / MCP)' },
    { color: 'var(--layer-deliver)',    label: 'Deliver — outbound boundary' },
    { color: 'var(--layer-ops)',        label: 'Operational — runtime supervisors' },
  ];

  const legend = legendItems.map(l => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${l.color}"></div>
      <span>${l.label}</span>
    </div>
  `).join('');

  const layers = d.layers.map((layer, i) => {
    const cls = layerClass[layer.id] || '';
    // Foundation open by default, rest collapsed
    const openClass = i === 0 ? 'open' : '';
    return `
      <div class="layer ${cls} ${openClass}" id="layer-${layer.id}">
        <div class="layer-header" onclick="toggleLayer('${layer.id}')">
          <div class="layer-stripe"></div>
          <div class="layer-title-bar">
            <div>
              <div class="layer-label">${layer.label}</div>
              <div class="layer-desc">${layer.description}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:16px;">
              <div class="layer-item-count">${layer.items.length} items</div>
              <div class="layer-chevron">▲</div>
            </div>
          </div>
        </div>
        <div class="layer-body">
          ${renderLayerExtras(layer)}
          <div class="items-grid">${renderItems(layer)}</div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="container">
      <header class="page-header">
        <div class="eyebrow">AppySentinel · Documentation</div>
        <h1>${d.title}</h1>
        <div class="subtitle">${d.subtitle}</div>
        <div class="legend">${legend}</div>
      </header>

      <div class="controls-row">
        <button class="ctrl-btn" onclick="expandAll()">Expand all</button>
        <button class="ctrl-btn" onclick="collapseAll()">Collapse all</button>
      </div>

      <div class="layer-stack">${layers}</div>

      <div class="page-footer">
        <div class="footer-note">
          appysentinel · documentation workspace · 2026-04-26 &nbsp;·&nbsp;
          <a class="github-link" href="https://github.com/appydave/appysentinal" target="_blank">github.com/appydave/appysentinal</a>
        </div>
      </div>
    </div>
  `;
}

function toggleLayer(id) {
  document.getElementById('layer-' + id).classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.layer').forEach(el => el.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.layer').forEach(el => el.classList.remove('open'));
}

function toggleCard(id) {
  const card = document.getElementById(id);
  const btn = card.querySelector('.item-expand-toggle');
  card.classList.toggle('expanded');
  btn.textContent = card.classList.contains('expanded') ? '− less' : '+ more';
}
</script>
</body>
</html>
