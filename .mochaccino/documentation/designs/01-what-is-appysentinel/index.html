<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What is AppySentinel?</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Roboto+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-brown:        #342d2d;
      --brand-gold:         #ccba9d;
      --brand-yellow:       #ffde59;
      --brand-amber:        #c8841a;
      --brand-muted:        #7a6e5e;
      --brand-near-white:   #faf5ec;
      --brand-surface:      #f0ebe4;
      --brand-linen:        #e8e0d4;
      --brand-border:       #d4cdc4;
      --brand-chrome:       #1a1515;
      --brand-dark-surface: #25201e;
      --brand-blue:         #2E91FC;

      --collect-color: #1a6eb5;
      --collect-bg:    #eaf2fc;
      --expose-color:  #2a7a5a;
      --expose-bg:     #e6f5ee;
      --deliver-color: #b5640f;
      --deliver-bg:    #fdf0dc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--brand-near-white);
      color: var(--brand-brown);
      line-height: 1.6;
    }

    /* ── Banner ── */
    .mocha-banner {
      background: var(--brand-chrome);
      color: var(--brand-gold);
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      padding: 7px 32px;
      letter-spacing: 0.1em;
    }

    /* ── Layout ── */
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ── Page header ── */
    .page-header {
      padding: 64px 0 52px;
      border-bottom: 2px solid var(--brand-linen);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
    }

    .eyebrow {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-amber);
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: clamp(38px, 5.5vw, 60px);
      line-height: 1.0;
      text-transform: uppercase;
      color: var(--brand-brown);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .github-link {
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      color: var(--brand-muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--brand-border);
      padding-bottom: 1px;
    }
    .github-link:hover { color: var(--brand-brown); border-color: var(--brand-brown); }

    .subtitle {
      font-size: 16px;
      color: var(--brand-muted);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    .header-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: var(--brand-gold);
      background: var(--brand-dark-surface);
      padding: 8px 14px;
      align-self: start;
      margin-top: 4px;
      white-space: nowrap;
    }

    /* ── Definition ── */
    .definition-block {
      padding: 52px 0 44px;
      border-bottom: 1px solid var(--brand-linen);
      display: grid;
      grid-template-columns: 4px 1fr;
      gap: 24px;
      align-items: stretch;
    }

    .definition-rule {
      background: var(--brand-yellow);
      border-radius: 0;
      flex-shrink: 0;
    }

    .definition-text {
      font-size: clamp(15px, 1.9vw, 19px);
      line-height: 1.75;
      color: var(--brand-brown);
      max-width: 780px;
      font-weight: 300;
    }

    /* ── Section wrapper ── */
    .section {
      padding: 48px 0;
      border-bottom: 1px solid var(--brand-linen);
    }

    .section-heading {
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-muted);
      margin-bottom: 28px;
    }

    /* ── Core rules ── */
    .rules-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--brand-linen);
    }

    .rule-item {
      background: var(--brand-near-white);
      padding: 28px 28px 30px;
      position: relative;
    }

    .rule-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--brand-linen);
    }

    .rule-item:nth-child(1)::before { background: var(--brand-yellow); }
    .rule-item:nth-child(2)::before { background: var(--brand-amber); }
    .rule-item:nth-child(3)::before { background: var(--brand-gold); }
    .rule-item:nth-child(4)::before { background: var(--brand-muted); }

    .rule-number {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--brand-amber);
      letter-spacing: 0.14em;
      margin-bottom: 10px;
    }

    .rule-name {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 21px;
      text-transform: uppercase;
      color: var(--brand-brown);
      margin-bottom: 10px;
      letter-spacing: 0.01em;
    }

    .rule-detail {
      font-size: 13.5px;
      color: var(--brand-muted);
      line-height: 1.65;
    }

    /* ── Three umbrellas ── */
    .umbrellas-layout {
      display: grid;
      grid-template-columns: 1fr 160px 1fr;
      gap: 0;
      align-items: center;
    }

    .umbrella-panel {
      padding: 28px 24px;
    }

    .umbrella-panel.collect {
      background: var(--collect-bg);
      border-top: 3px solid var(--collect-color);
      text-align: right;
    }

    .umbrella-panel.deliver {
      background: var(--deliver-bg);
      border-top: 3px solid var(--deliver-color);
    }

    .umbrella-direction-tag {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .collect .umbrella-direction-tag { color: var(--collect-color); }
    .deliver .umbrella-direction-tag { color: var(--deliver-color); }

    .umbrella-name-large {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 24px;
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .collect .umbrella-name-large { color: var(--collect-color); }
    .deliver .umbrella-name-large { color: var(--deliver-color); }

    .umbrella-desc-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--brand-muted);
    }

    .sentinel-column {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .expose-block {
      background: var(--expose-bg);
      border: 2px solid var(--expose-color);
      padding: 14px 16px;
      text-align: center;
      width: 100%;
    }

    .expose-block .umbrella-direction-tag {
      color: var(--expose-color);
      text-align: center;
    }

    .expose-block .umbrella-name-large {
      color: var(--expose-color);
      font-size: 18px;
      margin-bottom: 0;
    }

    .vertical-arrow {
      width: 2px;
      height: 20px;
      background: var(--expose-color);
      opacity: 0.5;
    }

    .sentinel-core {
      background: var(--brand-dark-surface);
      padding: 18px 20px;
      text-align: center;
      width: 100%;
    }

    .sentinel-core-label {
      font-family: 'Oswald', sans-serif;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-gold);
      margin-bottom: 4px;
    }

    .sentinel-core-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 0.06em;
      color: #fff;
      line-height: 1;
    }

    .umbrella-footnote {
      font-size: 12px;
      color: var(--brand-muted);
      margin-top: 20px;
      padding: 12px 16px;
      background: var(--brand-surface);
      border-left: 2px solid var(--brand-border);
      font-style: italic;
    }

    /* ── Getting Started ── */
    .scaffold-command {
      background: var(--brand-chrome);
      color: var(--brand-yellow);
      font-family: 'Roboto Mono', monospace;
      font-size: 15px;
      padding: 14px 20px;
      letter-spacing: 0.04em;
      margin-bottom: 28px;
      display: inline-block;
    }

    .moments-flow {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--brand-linen);
    }

    .moment-card {
      background: var(--brand-near-white);
      padding: 24px 22px;
      position: relative;
    }

    .moment-card:nth-child(1) { border-top: 3px solid var(--brand-amber); }
    .moment-card:nth-child(2) { border-top: 3px solid var(--collect-color); }
    .moment-card:nth-child(3) { border-top: 3px solid var(--expose-color); }

    .moment-num {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand-muted);
      margin-bottom: 6px;
    }

    .moment-label {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 20px;
      text-transform: uppercase;
      color: var(--brand-brown);
      margin-bottom: 10px;
    }

    .moment-desc {
      font-size: 13px;
      color: var(--brand-muted);
      line-height: 1.65;
    }

    /* ── vs AppyStack ── */
    .vs-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--brand-linen);
    }

    .vs-col {
      background: var(--brand-near-white);
      padding: 28px;
    }

    .vs-label {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-muted);
      margin-bottom: 8px;
    }

    .vs-name {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 22px;
      text-transform: uppercase;
      color: var(--brand-brown);
      margin-bottom: 12px;
    }

    .vs-col.sentinel-col .vs-name {
      color: var(--brand-amber);
    }

    .vs-desc {
      font-size: 13.5px;
      color: var(--brand-muted);
      line-height: 1.65;
    }

    /* ── Pilots ── */
    .pilots-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .pilot-card {
      background: var(--brand-surface);
      padding: 24px;
      border-top: 3px solid var(--brand-amber);
    }

    .pilot-num {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-amber);
      margin-bottom: 8px;
    }

    .pilot-name {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 17px;
      text-transform: uppercase;
      color: var(--brand-brown);
      margin-bottom: 10px;
    }

    .pilot-desc {
      font-size: 13px;
      color: var(--brand-muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .pilot-path {
      font-family: 'Roboto Mono', monospace;
      font-size: 10.5px;
      color: var(--brand-gold);
      background: var(--brand-chrome);
      padding: 5px 10px;
      display: inline-block;
    }

    /* ── Footer ── */
    .page-footer {
      padding: 32px 0 40px;
    }

    .footer-note {
      font-family: 'Roboto Mono', monospace;
      font-size: 10.5px;
      color: var(--brand-border);
      text-align: center;
      letter-spacing: 0.08em;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 120px 40px;
      font-family: 'Roboto Mono', monospace;
      font-size: 13px;
      color: var(--brand-muted);
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .container { padding: 0 20px; }
      .page-header { grid-template-columns: 1fr; }
      .rules-grid, .vs-split, .pilots-grid, .moments-flow { grid-template-columns: 1fr; }
      .umbrellas-layout { grid-template-columns: 1fr; }
      .umbrella-panel.collect { text-align: left; }
    }
  </style>
</head>
<body>

<div class="mocha-banner">Mocha — What is AppySentinel — 2026-04-27</div>

<div id="app"><div class="loading">Loading…</div></div>

<script>
fetch('../../data/01-what-is-appysentinel.json')
  .then(r => r.json())
  .then(render)
  .catch(e => {
    document.getElementById('app').innerHTML =
      `<div class="loading">Could not load data: ${e.message}</div>`;
  });

function render(d) {
  const collect  = d.three_umbrellas[0];
  const expose   = d.three_umbrellas[1];
  const deliver  = d.three_umbrellas[2];

  const ruleItems = d.core_rules.map((r, i) => `
    <div class="rule-item">
      <div class="rule-number">0${i + 1}</div>
      <div class="rule-name">${r.rule}</div>
      <div class="rule-detail">${r.detail}</div>
    </div>
  `).join('');

  const momentCards = d.getting_started.moments.map((m, i) => `
    <div class="moment-card">
      <div class="moment-num">0${i + 1}</div>
      <div class="moment-label">${m.label}</div>
      <div class="moment-desc">${m.description}</div>
    </div>
  `).join('');

  const pilotCards = d.v1_pilots.map((p, i) => `
    <div class="pilot-card">
      <div class="pilot-num">Pilot 0${i + 1}</div>
      <div class="pilot-name">${p.name}</div>
      <div class="pilot-desc">${p.description}</div>
      <div class="pilot-path">${p.path}</div>
    </div>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="container">

      <header class="page-header">
        <div>
          <div class="eyebrow">AppySentinel · Documentation</div>
          <h1>${d.title.replace('AppySentinel', '<span>AppySentinel</span>')}</h1>
          <div class="subtitle">${d.subtitle}</div>
        </div>
        <div class="header-badge">v1 · 2026</div>
      </header>

      <div class="definition-block">
        <div class="definition-rule"></div>
        <p class="definition-text">${d.definition}</p>
      </div>

      <div class="section">
        <div class="section-heading">Core Rules</div>
        <div class="rules-grid">${ruleItems}</div>
      </div>

      <div class="section">
        <div class="section-heading">The Three Boundary Umbrellas</div>
        <div class="umbrellas-layout">

          <div class="umbrella-panel collect">
            <div class="umbrella-direction-tag">← ${collect.direction}</div>
            <div class="umbrella-name-large">${collect.name}</div>
            <div class="umbrella-desc-text">${collect.description}</div>
          </div>

          <div class="sentinel-column">
            <div class="expose-block">
              <div class="umbrella-direction-tag">↕ ${expose.direction}</div>
              <div class="umbrella-name-large">${expose.name}</div>
            </div>
            <div class="vertical-arrow"></div>
            <div class="sentinel-core">
              <div class="sentinel-core-label">Always-on</div>
              <div class="sentinel-core-name">Sentinel</div>
            </div>
            <div class="vertical-arrow"></div>
          </div>

          <div class="umbrella-panel deliver">
            <div class="umbrella-direction-tag">${deliver.direction} →</div>
            <div class="umbrella-name-large">${deliver.name}</div>
            <div class="umbrella-desc-text">${deliver.description}</div>
          </div>

        </div>
        <div class="umbrella-footnote">
          Same technology can play different roles across umbrellas — role, not tech, picks the umbrella.
        </div>
      </div>

      <div class="section">
        <div class="section-heading">Getting Started — Three Moments</div>
        <div class="scaffold-command">${d.getting_started.command}</div>
        <div class="moments-flow">${momentCards}</div>
      </div>

      <div class="section">
        <div class="section-heading">AppySentinel vs AppyStack</div>
        <div class="vs-split">
          <div class="vs-col">
            <div class="vs-label">Builds web apps</div>
            <div class="vs-name">AppyStack</div>
            <div class="vs-desc">${d.vs_appystack.appystack}</div>
          </div>
          <div class="vs-col sentinel-col">
            <div class="vs-label">Builds data coordinators</div>
            <div class="vs-name">AppySentinel</div>
            <div class="vs-desc">${d.vs_appystack.appysentinel}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-heading">v1 Pilots — Proving the Boilerplate</div>
        <div class="pilots-grid">${pilotCards}</div>
      </div>

      <div class="page-footer">
        <div class="footer-note">appysentinel · documentation workspace · 2026-04-27 &nbsp;·&nbsp; <a class="github-link" href="https://github.com/appydave/appysentinal" target="_blank">github.com/appydave/appysentinal</a></div>
      </div>

    </div>
  `;
}
</script>
</body>
</html>
